<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气与骑行日历</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        .chart-container {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.06);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin: 0 0 10px 0;
            flex-shrink: 0;
        }
        .control {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }
        select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        #mainChart {
            width: 100%;
            flex: 1;
            min-height: 0;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>🌤️ 每月骑行量与天气指标</h2>
        <div class="control">
            <label for="metricSelect">对比指标：</label>
            <select id="metricSelect">
                <option value="precip">降水 (mm)</option>
                <option value="humidity">湿度 (%)</option>
                <option value="wind">风速 (km/h)</option>
            </select>
        </div>
        <div id="mainChart"></div>
    </div>

    <script>
        const DATA = {"months": ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"], "rides": [12677, 15104, 17109, 23634, 34456, 40937, 42268, 44432, 39022, 39138, 24910, 20205], "temp": [29.2, 39.3, 37.5, 46.5, 63.7, 69.3, 75.5, 76.4, 69.7, 56.9, 43.2, 38.0], "precip": [79.9, 175.7, 137.7, 119.1, 105.7, 90.0, 161.2, 160.9, 277.9, 114.7, 174.4, 153.3], "humidity": [66.4, 74.4, 66.2, 66.2, 75.7, 74.7, 76.4, 80.5, 84.6, 75.7, 72.0, 74.6], "wind": [23.3, 21.9, 25.7, 25.8, 20.3, 19.8, 20.7, 18.6, 19.1, 23.0, 25.3, 21.8]};
        const chart = echarts.init(document.getElementById('mainChart'));

        const metricNames = {
            precip: '降水 (mm)',
            humidity: '湿度 (%)',
            wind: '风速 (km/h)'
        };

        function renderChart(metric) {
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                legend: {
                    data: ['骑行量', '平均温度 (°F)', metricNames[metric]],
                    top: 0
                },
                grid: {
                    left: '8%',
                    right: '8%',
                    top: 50,
                    bottom: 30
                },
                xAxis: {
                    type: 'category',
                    data: DATA.months,
                    axisLabel: { rotate: 0 }
                },
                yAxis: [
                    {
                        type: 'value',
                        name: '骑行次数',
                        axisLabel: { formatter: val => val.toLocaleString() }
                    },
                    {
                        type: 'value',
                        name: '温度 / 气候指标',
                        axisLabel: { formatter: '{value}' }
                    }
                ],
                series: [
                    {
                        name: '骑行量',
                        type: 'bar',
                        data: DATA.rides,
                        yAxisIndex: 0,
                        color: '#3498db',
                        label: {
                            show: true,
                            position: 'top',
                            formatter: p => p.value.toLocaleString(),
                            fontSize: 10
                        }
                    },
                    {
                        name: '平均温度 (°F)',
                        type: 'line',
                        data: DATA.temp,
                        yAxisIndex: 1,
                        color: '#e74c3c',
                        lineStyle: { width: 3 },
                        symbol: 'circle',
                        symbolSize: 8,
                        label: { show: false }
                    },
                    {
                        name: metricNames[metric],
                        type: 'line',
                        data: DATA[metric],
                        yAxisIndex: 1,
                        color: '#27ae60',
                        lineStyle: { width: 2, type: 'dashed' },
                        symbol: 'diamond',
                        symbolSize: 7,
                        label: { show: false }
                    }
                ]
            };
            chart.setOption(option, true);
        }

        renderChart('precip');

        document.getElementById('metricSelect').addEventListener('change', function(e) {
            renderChart(e.target.value);
        });

        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
