St", "count": 513}], "all": [{"name": "Grove St PATH", "count": 40931}, {"name": "Hamilton Park", "count": 20867}, {"name": "Exchange Place", "count": 18970}, {"name": "Sip Ave", "count": 18184}, {"name": "Newport PATH", "count": 15247}, {"name": "Harborside", "count": 12105}, {"name": "Morris Canal", "count": 10534}, {"name": "Marin Light Rail", "count": 10371}, {"name": "Newport Pkwy", "count": 10108}, {"name": "Newark Ave", "count": 9462}]}, "monthlyUsers": {"1": {"Subscriber": 12492, "Customer": 185}, "2": {"Subscriber": 14915, "Customer": 189}, "3": {"Subscriber": 16673, "Customer": 436}, "4": {"Subscriber": 21891, "Customer": 1743}, "5": {"Subscriber": 31998, "Customer": 2458}, "6": {"Subscriber": 37750, "Customer": 3187}, "7": {"Subscriber": 38474, "Customer": 3794}, "8": {"Subscriber": 41274, "Customer": 3158}, "9": {"Subscriber": 35498, "Customer": 3524}, "10": {"Subscriber": 37134, "Customer": 2004}, "11": {"Subscriber": 24012, "Customer": 898}, "12": {"Subscriber": 19614, "Customer": 591}}, "totalUsers": {"Subscriber": 331725, "Customer": 22167}};

const monthSelect = document.getElementById('monthSelect');
const mapIn = L.map('mapIn').setView([40.72, -74.00], 13);
const mapOut = L.map('mapOut').setView([40.72, -74.00], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OpenStreetMap'
}).addTo(mapIn);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OpenStreetMap'
}).addTo(mapOut);

// 初始化 ECharts
const barInChart = echarts.init(document.getElementById('barIn'));
const barOutChart = echarts.init(document.getElementById('barOut'));
const barUserChart = echarts.init(document.getElementById('barUser'));
const pieChart = echarts.init(document.getElementById('pieUser'));

// 当前选中的月份（字符串 "all" 或 "1"~"12"）
let currentMonth = 'all';

// 工具函数：获取某月计数
function getCount(site, month) {
    if (month === 'all') return site.total;
    return site.counts[parseInt(month)] || 0;
}

// 更新地图标记
let inMarkers = [];
let outMarkers = [];
function updateMaps() {
    // 清除旧标记
    inMarkers.forEach(m => mapIn.removeLayer(m));
    outMarkers.forEach(m => mapOut.removeLayer(m));
    inMarkers = [];
    outMarkers = [];

    // 找出最大值用于半径缩放（避免太大或太小）
    let maxIn = 0, maxOut = 0;
    DATA.inflowSites.forEach(s => { let c = getCount(s, currentMonth); if (c > maxIn) maxIn = c; });
    DATA.outflowSites.forEach(s => { let c = getCount(s, currentMonth); if (c > maxOut) maxOut = c; });

    function radius(count, max) {
        if (max === 0) return 1;
        return Math.sqrt(count / max) * 20 + 3;
    }

    DATA.inflowSites.forEach(site => {
        const cnt = getCount(site, currentMonth);
        if (cnt === 0) return;
        const marker = L.circleMarker([site.lat, site.lng], {
            radius: radius(cnt, maxIn),
            color: '#e74c3c',
            fillColor: '#e74c3c',
            fillOpacity: 0.6,
            weight: 1
        }).addTo(mapIn);
        marker.bindPopup(`<b>${site.name}</b><br>流入: ${cnt} 次`);
        inMarkers.push(marker);
    });

    DATA.outflowSites.forEach(site => {
        const cnt = getCount(site, currentMonth);
        if (cnt === 0) return;
        const marker = L.circleMarker([site.lat, site.lng], {
            radius: radius(cnt, maxOut),
            color: '#3498db',
            fillColor: '#3498db',
            fillOpacity: 0.6,
            weight: 1
        }).addTo(mapOut);
        marker.bindPopup(`<b>${site.name}</b><br>流出: ${cnt} 次`);
        outMarkers.push(marker);
    });
}

// 更新 Top10 柱状图
function updateTop10() {
    const topIn = DATA.topInflow[currentMonth] || [];
    const topOut = DATA.topOutflow[currentMonth] || [];

    const inNames = topIn.map(d => d.name).reverse();
    const inCounts = topIn.map(d => d.count).reverse();
    const outNames = topOut.map(d => d.name).reverse();
    const outCounts = topOut.map(d => d.count).reverse();

    barInChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: '25%', right: '5%', top: 10, bottom: 20 },
        xAxis: { type: 'value' },
        yAxis: { type: 'category', data: inNames, axisLabel: { width: 120, overflow: 'truncate' } },
        series: [{ data: inCounts, type: 'bar', color: '#e74c3c', label: { show: true, position: 'right' } }]
    }, true);

    barOutChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: '25%', right: '5%', top: 10, bottom: 20 },
        xAxis: { type: 'value' },
        yAxis: { type: 'category', data: outNames, axisLabel: { width: 120, overflow: 'truncate' } },
        series: [{ data: outCounts, type: 'bar', color: '#3498db', label: { show: true, position: 'right' } }]
    }, true);
}

// 更新用户画像图
function updateUserCharts() {
    const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    if (currentMonth === 'all') {
        // 柱状图：所有月份的堆叠
        const subscribers = months.map((_, idx) => DATA.monthlyUsers[idx+1]?.Subscriber || 0);
        const customers = months.map((_, idx) => DATA.monthlyUsers[idx+1]?.Customer || 0);
        barUserChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: { data: ['Subscriber', 'Customer'] },
            grid: { left: '15%', right: '5%', top: 20, bottom: 30 },
            xAxis: { type: 'category', data: months, axisLabel: { rotate: 30 } },
            yAxis: { type: 'value' },
            series: [
                { name: 'Subscriber', type: 'bar', stack: 'total', data: subscribers, color: '#2ecc71', label: { show: true, position: 'inside' } },
                { name: 'Customer', type: 'bar', stack: 'total', data: customers, color: '#f39c12', label: { show: true, position: 'inside' } }
            ]
        }, true);
        // 饼图：总量占比
        pieChart.setOption({
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'left' },
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                data: [
                    { value: DATA.totalUsers.Subscriber, name: 'Subscriber' },
                    { value: DATA.totalUsers.Customer, name: 'Customer' }
                ],
                color: ['#2ecc71','#f39c12'],
                label: { formatter: '{b}: {c} ({d}%)' }
            }]
        }, true);
    } else {
        const month = parseInt(currentMonth);
        const sub = DATA.monthlyUsers[month]?.Subscriber || 0;
        const cus = DATA.monthlyUsers[month]?.Customer || 0;
        // 柱状图：只显示该月
        barUserChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['Subscriber', 'Customer'] },
            grid: { left: '15%', right: '5%', top: 20, bottom: 30 },
            xAxis: { type: 'category', data: [months[month-1]] },
            yAxis: { type: 'value' },
            series: [
                { name: 'Subscriber', type: 'bar', stack: 'total', data: [sub], color: '#2ecc71', label: { show: true, position: 'inside' } },
                { name: 'Customer', type: 'bar', stack: 'total', data: [cus], color: '#f39c12', label: { show: true, position: 'inside' } }
            ]
        }, true);
        // 饼图：该月占比
        pieChart.setOption({
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'left' },
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                data: [
                    { value: sub, name: 'Subscriber' },
                    { value: cus, name: 'Customer' }
                ],
                color: ['#2ecc71','#f39c12'],
                label: { formatter: '{b}: {c} ({d}%)' }
            }]
        }, true);
    }
}

// 全局更新
function refreshAll() {
    updateMaps();
    updateTop10();
    updateUserCharts();
}

// 监听下拉框
monthSelect.addEventListener('change', function(e) {
    currentMonth = e.target.value;
    refreshAll();
});

// 初始渲染
refreshAll();

// 响应式调整大小
window.addEventListener('resize', () => {
    mapIn.invalidateSize();
    mapOut.invalidateSize();
    barInChart.resize();
    barOutChart.resize();
    barUserChart.resize();
    pieChart.resize();
});
</script>
