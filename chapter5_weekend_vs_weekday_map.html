        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 颜色映射：红 -> 黄 -> 绿
        function getColor(ratio) {
            // 0% (纯工作日) -> 红色; 50% -> 黄色; 100% (纯周末) -> 绿色
            if (ratio < 20) return '#d32f2f';
            if (ratio < 35) return '#f57c00';
            if (ratio < 50) return '#fbc02d';
            if (ratio < 65) return '#8bc34a';
            return '#388e3c';
        }

        DATA.sites.forEach(s => {
            const marker = L.circleMarker([s.lat, s.lng], {
                radius: Math.sqrt(s.total) * 1.5, // 半径代表总量
                fillColor: getColor(s.ratio),
                color: '#fff',
                weight: 1,
                fillOpacity: 0.8
            }).addTo(map);

            // 绑定悬停显示的 Tooltip
            marker.bindTooltip(`
                <div style="line-height:1.4">
                    <b>${s.name} (${s.id})</b><br>

                    weekend_ratio = ${s.ratio}%<br>
                    weekday = ${s.weekday}<br>
                    weekend = ${s.weekend}
                </div>
            `, { 
                className: 'custom-tooltip',

                direction: 'top',

            });
