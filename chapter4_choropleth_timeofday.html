        let currentLayer = L.layerGroup().addTo(map);

        // 模仿图片中的深蓝色调调色板
        function getColor(count) {
            return count > 500 ? '#08306b' :
                   count > 200 ? '#2171b5' :
                   count > 100 ? '#6baed6' :
                   count > 50  ? '#bdd7e7' : '#eff3ff';
        }

        function render(bucket) {
            currentLayer.clearLayers();
            const data = RIDERSHIP[bucket] || [];
            
            data.forEach(p => {
                L.circleMarker([p.lat, p.lng], {
                    radius: Math.sqrt(p.count) * 2,
                    fillColor: getColor(p.count),
                    color: '#fff',
                    weight: 1,
                    fillOpacity: 0.8
                }).bindPopup(`骑行量: ${p.count}`).addTo(currentLayer);
            });
        }

        function changeBucket(bucket, el) {
            document.querySelectorAll('.panel-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            render(bucket);
        }

        // 初始化
        const firstMenu = document.querySelector('.panel-item');
        changeBucket('Early Morning (12AM-4AM)', firstMenu);
