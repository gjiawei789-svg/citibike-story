        const map = L.map('map', { zoomControl: false }).setView(DATA.center, 14);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        function getColor(ratio) {
            if (ratio < 20) return '#d32f2f';
            if (ratio < 35) return '#f57c00';
            if (ratio < 50) return '#fbc02d';
            if (ratio < 65) return '#8bc34a';
            return '#388e3c';
        }

        let layer = L.layerGroup().addTo(map);

        function update(type) {
            layer.clearLayers();
            const sites = DATA[type];

            sites.forEach(s => {
                // 调小半径系数从 1.5 降至 0.8，防止遮挡
                const radius = Math.sqrt(s.total) * 0.8; 
                
                const marker = L.circleMarker([s.lat, s.lng], {
                    radius: radius,
                    fillColor: getColor(s.ratio),
                    color: '#fff',
                    weight: 1,
                    fillOpacity: 0.75
                }).addTo(layer);

                marker.bindTooltip(`
                    <div style="line-height:1.4">
                        <b>${s.name}</b><br>
                        出行总量: ${s.total}<br>
                        周末占比: ${s.ratio}%<br>
                        工作日: ${s.weekday}<br>
                        周末: ${s.weekend}
                    </div>
                `, { className: 'custom-tooltip', sticky: true });
            });
        }

        document.getElementById('typeSelect').onchange = (e) => update(e.target.value);
        update('start_stats');
    </script>
