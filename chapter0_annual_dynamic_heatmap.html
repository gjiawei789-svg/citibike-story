        const map = L.map('map', { zoomControl: false }).setView([40.72, -74.04], 14);

        // 使用 CartoDB 的深色夜间底图
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let currentLayer = L.layerGroup().addTo(map);
        let currentMonth = 1;
        let isPlaying = false;
        let timer = null;

        // 图片同款色系映射 (Plasma)
        function getColor(count) {
            return count > 600 ? '#f0f921' :
                   count > 500 ? '#f89441' :
                   count > 400 ? '#cc4778' :
                   count > 300 ? '#7e03a8' :
                   count > 100 ? '#4b03a1' :
                                 '#0d0887';
        }

        function updateMap(month) {
            currentLayer.clearLayers();
            const data = annualData[month]['start']; // 默认展示流入/流出的一张
            
            data.forEach(item => {
                const [lat, lng, count] = item;
                L.circleMarker([lat, lng], {
                    radius: Math.sqrt(count) * 0.8, // 调整半径缩放
                    fillColor: getColor(count),
                    color: '#fff',
                    weight: 0.5,
                    opacity: 0.3,
                    fillOpacity: 0.7
                }).addTo(currentLayer);
            });
            
            document.getElementById('monthSlider').value = month;
            document.getElementById('monthVal').innerText = month;
        }

        // 播放逻辑
        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn');
            if (isPlaying) {
                btn.innerText = '暂停';
                btn.style.background = '#ffa502';
                timer = setInterval(() => {
                    currentMonth = currentMonth >= 12 ? 1 : currentMonth + 1;
                    updateMap(currentMonth);
                }, 1000); // 每秒切换一个月
            } else {
                btn.innerText = '播放';
                btn.style.background = '#ff4757';
                clearInterval(timer);
            }
        }

        document.getElementById('playBtn').onclick = togglePlay;
        document.getElementById('monthSlider').oninput = (e) => {
            currentMonth = parseInt(e.target.value);
            updateMap(currentMonth);
        };

        // 初始化显示1月
        updateMap(1);
    </script>
