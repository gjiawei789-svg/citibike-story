<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CitiBike 月度动态热力图</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet.heat 插件 -->
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .top-row {
            display: flex;
            flex: 1;
            min-height: 0;
        }
        .bottom-row {
            display: flex;
            height: 40vh;
            min-height: 300px;
        }
        .map-box {
            flex: 1;
            position: relative;
            border: 1px solid #333;
        }
        .chart-box {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            position: relative;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        .months-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            min-width: 70px;
            text-align: center;
            color: #fff;
        }
        .play-btn {
            background: #e74c3c;
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 2px 10px rgba(231,76,60,0.5);
        }
        .play-btn:hover {
            background: #c0392b;
            box-shadow: 0 4px 15px rgba(231,76,60,0.8);
        }
        .play-btn.paused {
            background: #2ecc71;
            box-shadow: 0 2px 10px rgba(46,204,113,0.5);
        }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ddd;
            font-size: 0.85rem;
        }
        #speedSlider {
            width: 70px;
        }
        h3 {
            position: absolute;
            top: 10px;
            left: 20px;
            z-index: 500;
            margin: 0;
            font-size: 1rem;
            color: #ccc;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 顶部双地图 -->
    <div class="top-row">
        <div class="map-box" id="mapIn">
            <h3>📥 流入热力图 (骑行终点)</h3>
        </div>
        <div class="map-box" id="mapOut">
            <h3>📤 流出热力图 (骑行起点)</h3>
        </div>
    </div>

    <!-- 底部图表 -->
    <div class="bottom-row">
        <div class="chart-box" id="barUser">
            <h3>👥 会员 / 非会员骑行量</h3>
        </div>
        <div class="chart-box" id="pieUser">
            <h3>🥧 会员 / 非会员占比</h3>
        </div>
    </div>

    <!-- 浮动控制栏 -->
    <div class="controls">
        <button id="playPauseBtn" class="play-btn">▶</button>
        <span class="months-name" id="currentMonth">一月</span>
        <div class="speed-control">
            <span>⏱</span>
            <input type="range" id="speedSlider" min="500" max="4000" value="1500" step="100">
            <span id="speedLabel">1.5s</span>
        </div>
    </div>
</div>

    const monthsChinese = ['一月','二月','三月','四月','五月','六月',
                          '七月','八月','九月','十月','十一月','十二月'];

    // ============= 初始化地图 =============
    const mapIn = L.map('mapIn', {
        center: [40.72, -74.00],
        zoom: 13,
        zoomControl: true,
        attributionControl: false
    });
    const mapOut = L.map('mapOut', {
        center: [40.72, -74.00],
        zoom: 13,
        zoomControl: true,
        attributionControl: false
    });

    // 黑色夜间底图
    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18,
        subdomains: 'abcd'
    });
    darkLayer.addTo(mapIn);
    darkLayer.addTo(mapOut);

    // 热力图层容器
    let heatIn = L.heatLayer([], {
        radius: 25,
        blur: 15,
        maxZoom: 10,
        max: 1.0,
        gradient: { 0.4: 'blue', 0.6: 'cyan', 0.7: 'lime', 0.8: 'yellow', 1.0: 'red' }
    }).addTo(mapIn);

    let heatOut = L.heatLayer([], {
        radius: 25,
        blur: 15,
        maxZoom: 10,
        max: 1.0,
        gradient: { 0.4: 'blue', 0.6: 'cyan', 0.7: 'lime', 0.8: 'yellow', 1.0: 'red' }
    }).addTo(mapOut);

    // ECharts 实例
    const barChart = echarts.init(document.getElementById('barUser'));
    const pieChart = echarts.init(document.getElementById('pieUser'));

    // ============= 播放控制 =============
    let currentMonth = 1;
    let intervalId = null;
    let playing = true;
    const playBtn = document.getElementById('playPauseBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');

    function updateSpeedLabel() {
        const ms = parseInt(speedSlider.value);
        speedLabel.textContent = (ms / 1000).toFixed(1) + 's';
    }

    function togglePlay() {
        if (playing) {
            clearInterval(intervalId);
            playing = false;
            playBtn.textContent = '▶';
            playBtn.classList.add('paused');
        } else {
            startAutoPlay();
            playing = true;
            playBtn.textContent = '⏸';
            playBtn.classList.remove('paused');
        }
    }

    function startAutoPlay() {
        intervalId = setInterval(() => {
            currentMonth = currentMonth % 12 + 1;
            updateAll(currentMonth);
        }, parseInt(speedSlider.value));
    }

    speedSlider.addEventListener('input', () => {
        updateSpeedLabel();
        if (playing) {
            clearInterval(intervalId);
            startAutoPlay();
        }
    });

    playBtn.addEventListener('click', togglePlay);

    // ============= 更新图表 =============
    function updateAll(month) {
        // 显示月份
        document.getElementById('currentMonth').textContent = monthsChinese[month-1];

        // 更新热力图
        const inData = DATA.inflow[month] || [];
        const outData = DATA.outflow[month] || [];

        // 设置最大强度，动态调整颜色映射
        const maxIn = inData.length ? Math.max(...inData.map(d => d[2])) : 1;
        const maxOut = outData.length ? Math.max(...outData.map(d => d[2])) : 1;

        heatIn.setLatLngs(inData);
        heatIn.setOptions({ max: maxIn });

        heatOut.setLatLngs(outData);
        heatOut.setOptions({ max: maxOut });

        // 更新会员柱状图（横向堆叠柱状图）
        const users = DATA.monthly_users[month] || { Subscriber: 0, Customer: 0 };
        barChart.setOption({
            backgroundColor: '#111',
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: {
                data: ['Subscriber', 'Customer'],
                textStyle: { color: '#ccc' }
            },
            grid: { left: '20%', right: '10%', top: 50, bottom: 20 },
            xAxis: {
                type: 'value',
                axisLabel: { color: '#aaa' },
                splitLine: { lineStyle: { color: '#333' } }
            },
            yAxis: {
                type: 'category',
                data: [monthsChinese[month-1]],
                axisLabel: { color: '#fff', fontSize: 14 }
            },
            series: [
                {
                    name: 'Subscriber',
                    type: 'bar',
                    stack: 'total',
                    data: [users.Subscriber],
                    color: '#3498db',
                    label: { show: true, position: 'inside', color: '#fff', formatter: p => p.value }
                },
                {
                    name: 'Customer',
                    type: 'bar',
                    stack: 'total',
                    data: [users.Customer],
                    color: '#f39c12',
                    label: { show: true, position: 'inside', color: '#fff', formatter: p => p.value }
                }
            ]
        }, true);

        // 更新饼图
        pieChart.setOption({
            backgroundColor: '#111',
            tooltip: { trigger: 'item' },
            legend: {
                orient: 'vertical',
                left: 'left',
                top: 'middle',
                textStyle: { color: '#ccc' }
            },
            series: [{
                type: 'pie',
                radius: ['45%', '75%'],
                center: ['55%', '55%'],
                data: [
                    { value: users.Subscriber, name: 'Subscriber', itemStyle: { color: '#3498db' } },
                    { value: users.Customer, name: 'Customer', itemStyle: { color: '#f39c12' } }
                ],
                label: {
                    color: '#fff',
                    formatter: '{b}: {c} ({d}%)'
                }
            }]
        }, true);
    }

    // 初始显示1月并开始自动播放
    updateAll(1);
    startAutoPlay();

    // 响应窗口大小变化
    window.addEventListener('resize', () => {
        mapIn.invalidateSize();
        mapOut.invalidateSize();
        barChart.resize();
        pieChart.resize();
    });

    // 允许手动点击月份
    document.getElementById('currentMonth').addEventListener('click', () => {
        // 可扩展：点击暂停并显示月份选择器，这里简单实现暂停
        if (playing) togglePlay();
    });
</script>
